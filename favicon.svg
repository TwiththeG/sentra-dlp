<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient stroke: blue → cyan (giống hero SVG) -->
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background square (cho favicon tab) -->
  <rect width="100" height="100" fill="#060a12"/>
  <!-- Shield: nền navy tối + gradient stroke (giống hero) -->
  <path d="M50 5 L90 22 L90 55 C90 75 72 90 50 97 C28 90 10 75 10 55 L10 22 Z"
        fill="#0f2847"
        stroke="url(#g)"
        stroke-width="3"
        stroke-linejoin="round"
        filter="url(#glow)"/>
  <!-- Left inner highlight -->
  <path d="M50 5 L50 97 C28 90 10 75 10 55 L10 22 Z" fill="rgba(59,130,246,0.10)"/>
  <!-- S letter phát sáng -->
  <text x="50" y="71"
        font-family="Arial Black, Arial"
        font-weight="900"
        font-size="54"
        fill="#60a5fa"
        text-anchor="middle"
        filter="url(#glow)">S</text>
</svg>
